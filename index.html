function TagsTab({dbTags,setDbTags}) {
  const [formItem,setFormItem]=useState(null);
  const [confirmDel,setConfirmDel]=useState(null);
  const [deleting,setDeleting]=useState(false);
  const sorted=[...dbTags].sort((a,b)=>a.sort_order-b.sort_order);

  const handleSave=async(payload,isEdit)=>{
    if(isEdit){
      const{id,...data}=payload;
      const{data:row,error}=await db.from('tags').update(data).eq('id',id).select().single();
      if(error)return error.message;
      setDbTags(prev=>prev.map(x=>x.id===id?row:x));
    }else{
      const{data:row,error}=await db.from('tags').insert(payload).select().single();
      if(error)return error.message;
      setDbTags(prev=>[...prev,row]);
    }
    return null;
  };

  const handleDelete=async id=>{
    setDeleting(true);
    await db.from('tags').delete().eq('id',id);
    setDbTags(prev=>prev.filter(x=>x.id!==id));
    setDeleting(false); setConfirmDel(null);
  };

  return <>
    <p className="nfg-page-sub">{dbTags.length} Tags definiert</p>
    <div className="nfg-admin-bar">
      <div/>
      <button className="nfg-btn-primary" onClick={()=>setFormItem(false)}>+ Neuer Tag</button>
    </div>
    {sorted.length===0&&<div className="nfg-empty">Noch keine Tags. SQL-Migration ausführen oder manuell anlegen.</div>}
    <div className="nfg-admin-list">
      {sorted.map(dt=><div key={dt.id} className="nfg-admin-item">
        <div className="nfg-admin-dot" style={{background:'#84cc16'}}/>
        <div className="nfg-admin-info">
          <div className="nfg-admin-name">{dt.name_de}{dt.name_en?<span style={{color:'#888',fontWeight:400}}> / {dt.name_en}</span>:null}</div>
          <div className="nfg-admin-meta">ID: {dt.id} · Reihenfolge: {dt.sort_order}</div>
        </div>
        <div className="nfg-admin-actions">
          <button className="nfg-btn-sm nfg-btn-sm-edit" onClick={()=>setFormItem(dt)}>Bearbeiten</button>
          <button className="nfg-btn-sm nfg-btn-sm-del" onClick={()=>setConfirmDel(dt)}>Löschen</button>
        </div>
      </div>)}
    </div>
    {formItem!==null&&<TagFormModal initial={formItem||null} onClose={()=>setFormItem(null)} onSave={handleSave}/>}
    {confirmDel&&<div className="nfg-form-overlay" onClick={e=>e.target.classList.contains('nfg-form-overlay')&&setConfirmDel(null)}>
      <div className="nfg-form-sheet" style={{maxWidth:420}}>
        <h3 style={{margin:'0 0 12px',fontSize:20,fontWeight:700}}>Tag löschen?</h3>
        <p style={{margin:'0 0 24px',color:'#666',fontSize:14}}>„{confirmDel.name_de}" wird dauerhaft entfernt.</p>
        <div style={{display:'flex',gap:10}}>
          <button className="nfg-btn-primary" style={{background:'#e53e3e',borderColor:'#e53e3e',color:'#fff'}} disabled={deleting} onClick={()=>handleDelete(confirmDel.id)}>
            {deleting?'Löschen…':'Endgültig löschen'}
          </button>
          <button className="nfg-btn-ghost" onClick={()=>setConfirmDel(null)}>Abbrechen</button>
        </div>
      </div>
    </div>}
  </>;
}

// ── Verwalten — Sprache tab ────────────────────────────────────
function SprachTab() {
  const [rows,setRows]=useState([]);
  const [loading,setLoading]=useState(true);
  const [saving,setSaving]=useState({});

  useEffect(()=>{
    db.from('translations').select('*').order('page').order('key')
      .then(({data})=>{ setRows(data||[]); setLoading(false); });
  },[]);

  const save=async(key,en)=>{
    setSaving(s=>({...s,[key]:true}));
    await db.from('translations').update({en:en||null,updated_at:new Date().toISOString()}).eq('key',key);
    setSaving(s=>({...s,[key]:false}));
  };

  const byPage={};
  rows.forEach(r=>{ if(!byPage[r.page]) byPage[r.page]=[]; byPage[r.page].push(r); });

  const translated=rows.filter(r=>r.en).length;

  if(loading) return <p style={{color:'#666',fontSize:14,marginTop:20}}>Laden…</p>;

  return <div>
    <p className="nfg-page-sub">{translated}/{rows.length} Texte übersetzt</p>
    {Object.entries(byPage).map(([page,pageRows])=><div key={page}>
      <div className="nfg-sprach-section">{page.charAt(0).toUpperCase()+page.slice(1)}</div>
      <table className="nfg-sprach-table">
        <thead>
          <tr>
            <th style={{width:'22%'}}>Key</th>
            <th style={{width:'35%'}}>Deutsch</th>
            <th>Englisch</th>
            <th style={{width:28}}/>
          </tr>
        </thead>
        <tbody>
          {pageRows.map(r=>{
            const hasTrans=!!r.en;
            return <tr key={r.key}>
              <td className="nfg-sprach-key">{r.key}</td>
              <td className="nfg-sprach-de">{r.de}</td>
              <td>
                <input
                  className="nfg-input"
                  style={{width:'100%',fontSize:13,padding:'5px 8px',borderColor:hasTrans?'var(--nfg-line)':'#ffcc00'}}
                  defaultValue={r.en||''}
                  onBlur={e=>{
                    const val=e.target.value.trim();
                    if(val!==(r.en||'')){
                      save(r.key,val);
                      setRows(prev=>prev.map(x=>x.key===r.key?{...x,en:val||null}:x));
                    }
                  }}
                />
              </td>
              <td style={{textAlign:'center',fontSize:12,color:'#aaa'}}>
                {saving[r.key]?'💾':hasTrans?<span style={{color:'#22c55e'}}>✓</span>:<span style={{color:'#f59e0b'}}>○</span>}
              </td>
            </tr>;
          })}
        </tbody>
      </table>
    </div>)}
  </div>;
}

                      <button style={{border:'none',background:'none',cursor:'pointer',fontSize:16,color:'#ccc',lineHeight:1,padding:'0 2px'}} title="Löschen" onClick={()=>delIakt(ia.id)}>×</button>
                    </div>
                  </div>
                  {ia.beschreibung&&<p style={{margin:'6px 0 0',fontSize:13,color:'#666',lineHeight:1.5,whiteSpace:'pre-wrap'}}>{ia.beschreibung}</p>}
                  {aktLinked&&<div style={{marginTop:6,fontSize:12,color:AKT_TYP[aktLinked.typ]?.color||'#8b5cf6',fontWeight:600}}>{AKT_TYP[aktLinked.typ]?.icon||'📋'} {aktLinked.titel}</div>}
                </div>
              </div>;
            })}
          </div>
        </section>
      </div>
    </div>
    {showIaktForm&&<CrmInteraktionFormModal contactName={contactName} onClose={()=>setShowIaktForm(false)} onSave={handleAddIakt}/>}
  </div>;
}

function CrmKontakteTab({events}) {
  const [contacts,setContacts]=useState([]);
  const [kategorien,setKategorien]=useState([]);
  const [loading,setLoading]=useState(true);
  const [search,setSearch]=useState('');
  const [filterKat,setFilterKat]=useState('');
  const [formItem,setFormItem]=useState(null);
  const [detail,setDetail]=useState(null);
  const [confirmDel,setConfirmDel]=useState(null);
  const [deleting,setDeleting]=useState(false);
  const [currentUserId,setCurrentUserId]=useState(null);
  const [unternehmen,setUnternehmen]=useState([]);

  useEffect(()=>{
    db.from('crm_unternehmen').select('id,name').order('name').then(({data})=>setUnternehmen(data||[]));
  },[]);

  const reload=()=>{
    db.from('crm_contacts_overview').select('*').order('nachname')
      .then(({data})=>{ setContacts(data||[]); setLoading(false); });
  };

  useEffect(()=>{
    db.auth.getUser().then(({data:{user}})=>setCurrentUserId(user?.id||null));
    db.from('crm_kategorien').select('*').order('sort_order').then(({data})=>setKategorien(data||[]));
    reload();
  },[]);

  const filtered=useMemo(()=>contacts.filter(c=>{
    if(filterKat&&c.kategorie_id!==filterKat)return false;
    if(search){const q=search.toLowerCase();if(![c.vorname,c.nachname,c.firma,c.funktion,c.email].filter(Boolean).join(' ').toLowerCase().includes(q))return false;}
    return true;
  }),[contacts,search,filterKat]);

  const handleSave=async(payload,isEdit)=>{
    const targetId=isEdit?(detail?.id||formItem?.id):null;
    if(isEdit&&targetId){
      const{error}=await db.from('crm_contacts').update(payload).eq('id',targetId);
      if(error) return error.message;
    }else{
      const{error}=await db.from('crm_contacts').insert(payload);
      if(error) return error.message;
    }
    reload();
    return null;
  };

  const handleDelete=async id=>{
    setDeleting(true);
    await db.from('crm_contacts').delete().eq('id',id);
    setContacts(prev=>prev.filter(x=>x.id!==id));
    setDetail(null); setDeleting(false); setConfirmDel(null);
  };

  // Stats by category
  const byKat=useMemo(()=>{
    const m={};
    contacts.forEach(c=>{ if(c.kategorie_id) m[c.kategorie_id]=(m[c.kategorie_id]||0)+1; });
    return m;
  },[contacts]);

  return <>
    {/* Summary stats */}
    {contacts.length>0&&<div style={{display:'flex',gap:10,flexWrap:'wrap',marginBottom:20}}>
      <div style={{background:'#fff',border:'1px solid var(--nfg-line)',borderRadius:12,padding:'12px 18px',textAlign:'center',minWidth:90}}>
        <div style={{fontSize:26,fontWeight:700}}>{contacts.length}</div>
        <div style={{fontSize:11,fontWeight:700,color:'#666',textTransform:'uppercase',letterSpacing:'0.04em'}}>Kontakte</div>
      </div>
      {kategorien.filter(k=>byKat[k.id]).map(k=><div key={k.id} style={{background:(k.farbe||'#6b7280')+'15',border:`1.5px solid ${k.farbe||'#6b7280'}40`,borderRadius:12,padding:'12px 18px',textAlign:'center',minWidth:80}}>
        <div style={{fontSize:22,fontWeight:700,color:k.farbe||'#6b7280'}}>{byKat[k.id]}</div>
        <div style={{fontSize:11,fontWeight:700,color:k.farbe||'#6b7280',textTransform:'uppercase',letterSpacing:'0.04em'}}>{k.name}</div>
      </div>)}
    </div>}

    <div className="nfg-admin-bar" style={{marginBottom:16}}>
      <div style={{display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}}>
        <div style={{position:'relative'}}>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#666" strokeWidth="2" style={{position:'absolute',left:12,top:'50%',transform:'translateY(-50%)'}}><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
          <input className="nfg-input" value={search} onChange={e=>setSearch(e.target.value)} placeholder="Name, Firma, E-Mail…" style={{paddingLeft:36,width:220}}/>
        </div>
        <select className="nfg-select" value={filterKat} onChange={e=>setFilterKat(e.target.value)} style={{minWidth:160}}>
          <option value="">Alle Kategorien</option>
          {kategorien.map(k=><option key={k.id} value={k.id}>{k.name}</option>)}
        </select>
      </div>
      <button className="nfg-btn-primary" onClick={()=>setFormItem(false)}>+ Neuer Kontakt</button>
    </div>

    {loading&&<div style={{padding:'32px 0',textAlign:'center',color:'#666'}}>Laden…</div>}
    {!loading&&filtered.length===0&&<div className="nfg-empty">{contacts.length===0?'Noch keine Kontakte. Füge den ersten Kontakt hinzu.':'Keine Treffer. Filter anpassen.'}</div>}

    <div className="nfg-admin-list">
      {filtered.map(c=>{
        const kat=kategorien.find(k=>k.id===c.kategorie_id);
        const initials=(c.vorname.charAt(0)+c.nachname.charAt(0)).toUpperCase();
        return <div key={c.id} className="nfg-admin-item" style={{cursor:'pointer'}} onClick={()=>setDetail(c)}>
          <div className="nfg-avatar" style={{width:38,height:38,fontSize:13,flexShrink:0,background:kat?.farbe||'#6b7280',color:'#fff'}}>{initials}</div>
          <div className="nfg-admin-info">
            <div className="nfg-admin-name" style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
              {c.vorname} {c.nachname}
              {c.kategorie_id&&<KatBadge katId={c.kategorie_id} kategorien={kategorien}/>}
              {!c.einwilligung&&<span style={{fontSize:10,color:'#b45309',background:'#fef3c7',borderRadius:4,padding:'1px 6px',fontWeight:700}}>⚠ DSG</span>}
            </div>
            <div className="nfg-admin-meta">
              {[c.funktion,c.firma].filter(Boolean).join(' · ')}
              {c.email&&<span style={{color:'#999'}}>{[c.funktion||c.firma?' · ':null,c.email].filter(Boolean).join('')}</span>}
            </div>
          </div>
          <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:3,flexShrink:0,fontSize:11,color:'#aaa',textAlign:'right'}}>
            {c.anzahl_interaktionen>0&&<span style={{background:'#f0f0f0',borderRadius:6,padding:'2px 8px',fontWeight:700,color:'#444',fontSize:12}}>{c.anzahl_interaktionen}×</span>}
            {c.letzte_interaktion&&<span>{fmtDate(c.letzte_interaktion)}</span>}
          </div>
        </div>;
      })}
    </div>

    {formItem!==null&&<CrmKontaktFormModal initial={formItem||null} kategorien={kategorien} unternehmen={unternehmen} onClose={()=>setFormItem(null)} onSave={handleSave}/>}

    {detail&&<CrmKontaktDetail
      contact={detail} kategorien={kategorien} currentUserId={currentUserId}
      onClose={()=>setDetail(null)}
      onEdit={c=>{setDetail(null);setFormItem(c);}}
      onDelete={c=>{setDetail(null);setConfirmDel(c);}}
    />}

    {confirmDel&&<div className="nfg-form-overlay" onClick={e=>e.target.classList.contains('nfg-form-overlay')&&setConfirmDel(null)}>
      <div className="nfg-form-sheet" style={{maxWidth:420}}>
        <h3 style={{margin:'0 0 12px',fontSize:20,fontWeight:700}}>Kontakt löschen?</h3>
        <p style={{margin:'0 0 24px',color:'#666',fontSize:14}}>„{confirmDel.vorname} {confirmDel.nachname}" und alle Interaktionen werden dauerhaft entfernt.</p>
        <div style={{display:'flex',gap:10}}>
          <button className="nfg-btn-primary" style={{background:'#e53e3e',borderColor:'#e53e3e',color:'#fff'}} disabled={deleting} onClick={()=>handleDelete(confirmDel.id)}>{deleting?'Löschen…':'Endgültig löschen'}</button>
          <button className="nfg-btn-ghost" onClick={()=>setConfirmDel(null)}>Abbrechen</button>
        </div>
      </div>
    </div>}
  </>;
}

const EMPTY_UNT={name:'',branche:'',website:'',adresse:'',plz:'',ort:'',land:'CH',telefon:'',email:'',notizen:''};
function CrmUnternehmenFormModal({initial,onClose,onSave}){
  const [f,setF]=useState(()=>initial?{
    name:initial.name||'',branche:initial.branche||'',website:initial.website||'',
    adresse:initial.adresse||'',plz:initial.plz||'',ort:initial.ort||'',
    land:initial.land||'CH',telefon:initial.telefon||'',email:initial.email||'',
    notizen:initial.notizen||''
  }:{...EMPTY_UNT});
  const [err,setErr]=useState('');
  const [saving,setSaving]=useState(false);
  const set=(k,v)=>setF(p=>({...p,[k]:v}));
  const submit=async e=>{
    e.preventDefault(); setErr('');
    if(!f.name.trim()){setErr('Name ist erforderlich.');return;}
    setSaving(true);
    const payload={name:f.name.trim(),branche:f.branche.trim()||null,website:f.website.trim()||null,
      adresse:f.adresse.trim()||null,plz:f.plz.trim()||null,ort:f.ort.trim()||null,land:f.land||'CH',
      telefon:f.telefon.trim()||null,email:f.email.trim()||null,notizen:f.notizen.trim()||null};
    const errMsg=await onSave(payload,!!initial);
    setSaving(false);
    if(errMsg){setErr(errMsg);return;}
    onClose();
  };
  const inp={className:'nfg-input'};
  return <div className="nfg-form-overlay" onClick={e=>e.target.classList.contains('nfg-form-overlay')&&onClose()}>
    <div className="nfg-form-sheet">
      <button className="nfg-form-close" onClick={onClose}>×</button>
      <h2 className="nfg-form-title">{initial?'Unternehmen bearbeiten':'Neues Unternehmen'}</h2>
      <form onSubmit={submit}>
        <div className="nfg-form-section-h">Stammdaten</div>
        <div className="nfg-form-row">
          <label className="nfg-label">Name *<input {...inp} value={f.name} onChange={e=>set('name',e.target.value)} required placeholder="Muster AG"/></label>
          <label className="nfg-label">Branche<input {...inp} value={f.branche} onChange={e=>set('branche',e.target.value)} placeholder="Landwirtschaft"/></label>
        </div>
        <div className="nfg-form-row one">
          <label className="nfg-label">Website<input {...inp} value={f.website} onChange={e=>set('website',e.target.value)} placeholder="www.beispiel.ch"/></label>
        </div>
        <div className="nfg-form-section-h">Adresse</div>
        <div className="nfg-form-row one">
          <label className="nfg-label">Strasse / Nr.<input {...inp} value={f.adresse} onChange={e=>set('adresse',e.target.value)} placeholder="Musterstrasse 1"/></label>
        </div>
        <div className="nfg-form-row">
          <label className="nfg-label">PLZ<input {...inp} value={f.plz} onChange={e=>set('plz',e.target.value)} placeholder="8001" style={{maxWidth:100}}/></label>
          <label className="nfg-label">Ort<input {...inp} value={f.ort} onChange={e=>set('ort',e.target.value)} placeholder="Zürich"/></label>
          <label className="nfg-label">Land<input {...inp} value={f.land} onChange={e=>set('land',e.target.value)} placeholder="CH" style={{maxWidth:80}}/></label>
        </div>
        <div className="nfg-form-section-h">Kontakt</div>
        <div className="nfg-form-row">
          <label className="nfg-label">Telefon<input {...inp} type="tel" value={f.telefon} onChange={e=>set('telefon',e.target.value)} placeholder="+41 44 000 00 00"/></label>
          <label className="nfg-label">E-Mail<input {...inp} type="email" value={f.email} onChange={e=>set('email',e.target.value)} placeholder="info@beispiel.ch"/></label>
        </div>
        <div className="nfg-form-section-h">Notizen</div>
        <div className="nfg-form-row one">
          <label className="nfg-label"><textarea className="nfg-textarea" rows={3} value={f.notizen} onChange={e=>set('notizen',e.target.value)} placeholder="Interne Notizen…"/></label>
        </div>
        {err&&<p className="nfg-err">{err}</p>}
        <div className="nfg-form-actions">
          <button className="nfg-btn-primary" type="submit" disabled={saving}>{saving?'Speichern…':initial?'Speichern':'Unternehmen erstellen'}</button>
          <button className="nfg-btn-ghost" type="button" onClick={onClose}>Abbrechen</button>
        </div>
      </form>
    </div>
  </div>;
}

// ── CRM Unternehmen Detail ─────────────────────────────────────
function CrmUnternehmenDetail({unt,onClose,onEdit,onDelete}){
  const [contacts,setContacts]=useState([]);
  const [aktivitaeten,setAktivitaeten]=useState([]);
  const [allAkt,setAllAkt]=useState([]);
  const [addingAkt,setAddingAkt]=useState(false);
  const [newAktId,setNewAktId]=useState('');
  const [newAktRolle,setNewAktRolle]=useState('');
  const [loading,setLoading]=useState(true);
  const [confirmDel,setConfirmDel]=useState(false);

  const reload=useCallback(()=>{
    Promise.all([
      db.from('crm_contacts_overview').select('id,vorname,nachname,funktion,kategorie_id').eq('unternehmen_id',unt.id),
      db.from('crm_unternehmen_aktivitaeten').select('*,crm_aktivitaeten(*)').eq('unternehmen_id',unt.id),
      db.from('crm_aktivitaeten').select('id,titel,typ,datum_von,status').order('datum_von',{ascending:false})
    ]).then(([{data:c},{data:ua},{data:a}])=>{
      setContacts(c||[]);
      setAktivitaeten(ua||[]);
      setAllAkt(a||[]);
      setLoading(false);
    });
  },[unt.id]);

  useEffect(()=>{ reload(); },[reload]);

  const handleAddAkt=async()=>{
    if(!newAktId) return;
    const{error}=await db.from('crm_unternehmen_aktivitaeten').insert({unternehmen_id:unt.id,aktivitaet_id:newAktId,rolle:newAktRolle.trim()||null});
    if(!error){ setAddingAkt(false); setNewAktId(''); setNewAktRolle(''); reload(); }
  };
  const handleRemoveAkt=async(aktId)=>{
    await db.from('crm_unternehmen_aktivitaeten').delete().eq('unternehmen_id',unt.id).eq('aktivitaet_id',aktId);
    reload();
  };

  const assigned=new Set(aktivitaeten.map(ua=>ua.aktivitaet_id));
  const available=allAkt.filter(a=>!assigned.has(a.id));

  return <div className="nfg-profile" onClick={e=>e.target.classList.contains('nfg-profile')&&onClose()}>
    <div className="nfg-profile-sheet">
      <button className="nfg-profile-close" onClick={onClose}>×</button>
      <div className="nfg-profile-body" style={{paddingTop:28}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:12,marginBottom:20,flexWrap:'wrap'}}>
          <div>
            {unt.branche&&<span style={{fontSize:11,fontWeight:700,color:'#888',textTransform:'uppercase',letterSpacing:'0.06em'}}>{unt.branche}</span>}
            <h1 className="nfg-profile-name" style={{marginTop:4,marginBottom:4}}>{unt.name}</h1>
            {(unt.ort||unt.land)&&<div style={{fontSize:13,color:'#666'}}>{[unt.plz,unt.ort,unt.land!=='CH'?unt.land:null].filter(Boolean).join(' ')}</div>}
          </div>
          <div style={{display:'flex',gap:6,flexShrink:0}}>
            <button className="nfg-btn-sm nfg-btn-sm-edit" onClick={()=>onEdit(unt)}>Bearbeiten</button>
            <button className="nfg-btn-sm nfg-btn-sm-del" onClick={()=>setConfirmDel(true)}>Löschen</button>

// ── CRM Aktivität Detail ───────────────────────────────────────
function CrmAktivitaetDetail({akt,onClose,onEdit,onDelete}){
  const [teilnehmer,setTeilnehmer]=useState([]);
  const [allUnt,setAllUnt]=useState([]);
  const [loading,setLoading]=useState(true);
  const [addingUnt,setAddingUnt]=useState(false);
  const [newUntId,setNewUntId]=useState('');
  const [newUntRolle,setNewUntRolle]=useState('');
  const [confirmDel,setConfirmDel]=useState(false);
  const typ=AKT_TYP[akt.typ]||AKT_TYP.sonstiges;

  const reload=useCallback(()=>{
    Promise.all([
      db.from('crm_unternehmen_aktivitaeten').select('*,crm_unternehmen(*)').eq('aktivitaet_id',akt.id),
      db.from('crm_unternehmen').select('id,name,branche').order('name')
    ]).then(([{data:t},{data:u}])=>{ setTeilnehmer(t||[]); setAllUnt(u||[]); setLoading(false); });
  },[akt.id]);

  useEffect(()=>{ reload(); },[reload]);

  const handleAddUnt=async()=>{
    if(!newUntId) return;
    const{error}=await db.from('crm_unternehmen_aktivitaeten').insert({unternehmen_id:newUntId,aktivitaet_id:akt.id,rolle:newUntRolle.trim()||null});
    if(!error){ setAddingUnt(false); setNewUntId(''); setNewUntRolle(''); reload(); }
  };
  const handleRemoveUnt=async(untId)=>{
    await db.from('crm_unternehmen_aktivitaeten').delete().eq('aktivitaet_id',akt.id).eq('unternehmen_id',untId);
    reload();
  };

  const assigned=new Set(teilnehmer.map(t=>t.unternehmen_id));
  const available=allUnt.filter(u=>!assigned.has(u.id));

  return <div className="nfg-profile" onClick={e=>e.target.classList.contains('nfg-profile')&&onClose()}>
    <div className="nfg-profile-sheet">
      <button className="nfg-profile-close" onClick={onClose}>×</button>
      <div className="nfg-profile-body" style={{paddingTop:28}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:12,marginBottom:20,flexWrap:'wrap'}}>
          <div>
            <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:6}}>
              <span style={{fontSize:22}}>{typ.icon}</span>
              <span style={{fontSize:12,fontWeight:700,color:typ.color,textTransform:'uppercase',letterSpacing:'0.06em'}}>{typ.label}</span>
              <AktBadge status={akt.status}/>
            </div>
            <h1 className="nfg-profile-name" style={{marginTop:0,marginBottom:4}}>{akt.titel}</h1>
            <div style={{fontSize:13,color:'#666',display:'flex',gap:12,flexWrap:'wrap'}}>
              {akt.datum_von&&<span>📅 {fmtDate(akt.datum_von)}{akt.datum_bis&&akt.datum_bis!==akt.datum_von?` – ${fmtDate(akt.datum_bis)}`:''}</span>}
              {akt.ort&&<span>📍 {akt.ort}</span>}
            </div>
          </div>
          <div style={{display:'flex',gap:6,flexShrink:0}}>
            <button className="nfg-btn-sm nfg-btn-sm-edit" onClick={()=>onEdit(akt)}>Bearbeiten</button>
            <button className="nfg-btn-sm nfg-btn-sm-del" onClick={()=>setConfirmDel(true)}>Löschen</button>
          </div>
        </div>

        {akt.beschreibung&&<section className="nfg-section">
          <h3 className="nfg-section-h">Beschreibung</h3>
          <p style={{fontSize:13,lineHeight:1.6,color:'#444',margin:0,whiteSpace:'pre-wrap'}}>{akt.beschreibung}</p>
        </section>}

        <section className="nfg-section">
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
            <h3 className="nfg-section-h" style={{margin:0}}>Teilnehmende Unternehmen ({teilnehmer.length})</h3>
            {!addingUnt&&available.length>0&&<button className="nfg-btn-primary" style={{padding:'6px 12px',fontSize:12}} onClick={()=>setAddingUnt(true)}>+ Unternehmen</button>}
          </div>
          {addingUnt&&<div style={{background:'#f9fafb',border:'1px solid var(--nfg-line)',borderRadius:10,padding:'12px',marginBottom:12,display:'flex',flexDirection:'column',gap:8}}>
            <select className="nfg-select" value={newUntId} onChange={e=>setNewUntId(e.target.value)} style={{width:'100%'}}>
              <option value="">— Unternehmen wählen —</option>
              {available.map(u=><option key={u.id} value={u.id}>{u.name}{u.branche?` · ${u.branche}`:''}</option>)}
            </select>
            <input className="nfg-input" value={newUntRolle} onChange={e=>setNewUntRolle(e.target.value)} placeholder="Rolle (z.B. Sponsor, Teilnehmer) — optional"/>
            <div style={{display:'flex',gap:8}}>
              <button className="nfg-btn-primary" style={{padding:'7px 14px',fontSize:12}} disabled={!newUntId} onClick={handleAddUnt}>Hinzufügen</button>
              <button className="nfg-btn-ghost" style={{padding:'7px 14px',fontSize:12}} onClick={()=>{setAddingUnt(false);setNewUntId('');setNewUntRolle('');}}>Abbrechen</button>
            </div>
          </div>}
          {!loading&&teilnehmer.length===0&&!addingUnt&&<div className="nfg-empty" style={{padding:'14px',fontSize:13}}>Noch keine Unternehmen verknüpft.</div>}
          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            {teilnehmer.map(t=>{
              const u=t.crm_unternehmen; if(!u) return null;
              return <div key={t.unternehmen_id} style={{background:'#fff',border:'1px solid var(--nfg-line)',borderRadius:10,padding:'10px 14px',display:'flex',alignItems:'center',gap:10}}>
                <span style={{fontSize:16,flexShrink:0}}>🏢</span>
                <div style={{flex:1}}>
                  <div style={{fontWeight:700,fontSize:13}}>{u.name}</div>
                  {(u.branche||t.rolle)&&<div style={{fontSize:11,color:'#888',marginTop:2}}>

              </div>;

          </div>
        </section>

        {akt.notizen&&<section className="nfg-section">
          <h3 className="nfg-section-h">Interne Notizen</h3>
          <p style={{fontSize:13,lineHeight:1.6,color:'#444',background:'#fffbeb',border:'1px solid #fde68a',borderRadius:10,padding:'12px 14px',margin:0,whiteSpace:'pre-wrap'}}>{akt.notizen}</p>
        </section>}
      </div>
    </div>

    {confirmDel&&<div className="nfg-form-overlay" style={{zIndex:400}} onClick={e=>e.target.classList.contains('nfg-form-overlay')&&setConfirmDel(false)}>
      <div className="nfg-form-sheet" style={{maxWidth:420}}>
        <h3 style={{margin:'0 0 12px',fontSize:20,fontWeight:700}}>Aktivität löschen?</h3>
        <p style={{margin:'0 0 24px',color:'#666',fontSize:14}}>„{akt.titel}" und alle Verknüpfungen werden dauerhaft entfernt.</p>
        <div style={{display:'flex',gap:10}}>
          <button className="nfg-btn-primary" style={{background:'#e53e3e',borderColor:'#e53e3e',color:'#fff'}} onClick={()=>{onDelete(akt);setConfirmDel(false);}}>Endgültig löschen</button>
          <button className="nfg-btn-ghost" onClick={()=>setConfirmDel(false)}>Abbrechen</button>
        </div>
      </div>
    </div>}
  </div>;
}

// ── CRM Unternehmen Tab ────────────────────────────────────────
function CrmUnternehmenTab(){
  const [list,setList]=useState([]);
  const [loading,setLoading]=useState(true);
  const [search,setSearch]=useState('');
  const [formItem,setFormItem]=useState(null);
  const [detail,setDetail]=useState(null);

  const reload=()=>{
    db.from('crm_unternehmen').select('*').order('name')
      .then(({data})=>{ setList(data||[]); setLoading(false); });
  };
  useEffect(()=>{ reload(); },[]);

  const handleSave=async(payload,isEdit)=>{
    if(isEdit&&formItem?.id){
      const{error}=await db.from('crm_unternehmen').update(payload).eq('id',formItem.id);
      if(error) return error.message;
    }else{
      const{error}=await db.from('crm_unternehmen').insert(payload);
      if(error) return error.message;
    }
    reload(); return null;
  };
  const handleDelete=async(u)=>{
    await db.from('crm_unternehmen').delete().eq('id',u.id);
    setList(prev=>prev.filter(x=>x.id!==u.id)); setDetail(null);
  };

  const filtered=useMemo(()=>list.filter(u=>{
    if(!search) return true;
    const q=search.toLowerCase();
    return [u.name,u.branche,u.ort,u.email].filter(Boolean).join(' ').toLowerCase().includes(q);
  }),[list,search]);

  return <>
    <div style={{display:'flex',gap:10,flexWrap:'wrap',marginBottom:20}}>
      <div style={{background:'#fff',border:'1px solid var(--nfg-line)',borderRadius:12,padding:'12px 18px',textAlign:'center',minWidth:90}}>
        <div style={{fontSize:26,fontWeight:700}}>{list.length}</div>
        <div style={{fontSize:11,fontWeight:700,color:'#666',textTransform:'uppercase',letterSpacing:'0.04em'}}>Unternehmen</div>
      </div>
    </div>
    <div className="nfg-admin-bar" style={{marginBottom:16}}>
      <div style={{position:'relative'}}>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#666" strokeWidth="2" style={{position:'absolute',left:12,top:'50%',transform:'translateY(-50%)'}}><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
        <input className="nfg-input" value={search} onChange={e=>setSearch(e.target.value)} placeholder="Name, Branche, Ort…" style={{paddingLeft:36,width:240}}/>
      </div>
      <button className="nfg-btn-primary" onClick={()=>setFormItem(false)}>+ Neues Unternehmen</button>
    </div>
    {loading&&<div style={{padding:'32px 0',textAlign:'center',color:'#666'}}>Laden…</div>}
    {!loading&&filtered.length===0&&<div className="nfg-empty">{list.length===0?'Noch keine Unternehmen. Füge das erste hinzu.':'Keine Treffer.'}</div>}
    <div className="nfg-admin-list">
      {filtered.map(u=><div key={u.id} className="nfg-admin-item" style={{cursor:'pointer'}} onClick={()=>setDetail(u)}>
        <div style={{width:38,height:38,borderRadius:10,background:'#f0f0f0',display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,flexShrink:0}}>🏢</div>
        <div className="nfg-admin-info">
          <div className="nfg-admin-name">{u.name}</div>
          <div className="nfg-admin-meta">{[u.branche,u.ort].filter(Boolean).join(' · ')}</div>
        </div>
        {u.website&&<span style={{fontSize:11,color:'#0a66c2',fontWeight:600,flexShrink:0}}>🌐</span>}
      </div>)}
    </div>
    {formItem!==null&&<CrmUnternehmenFormModal initial={formItem||null} onClose={()=>setFormItem(null)} onSave={handleSave}/>}
    {detail&&<CrmUnternehmenDetail unt={detail} onClose={()=>setDetail(null)} onEdit={u=>{setDetail(null);setFormItem(u);}} onDelete={handleDelete}/>}
  </>;
}

// ── CRM Aktivitäten Tab ────────────────────────────────────────
function CrmAktivitaetenTab(){
  const [list,setList]=useState([]);
  const [loading,setLoading]=useState(true);
  const [search,setSearch]=useState('');
  const [filterTyp,setFilterTyp]=useState('');
  const [formItem,setFormItem]=useState(null);
  const [detail,setDetail]=useState(null);

  const reload=()=>{
    db.from('crm_aktivitaeten').select('*').order('datum_von',{ascending:false,nullsFirst:false})
      .then(({data})=>{ setList(data||[]); setLoading(false); });
  };
  useEffect(()=>{ reload(); },[]);

  const handleSave=async(payload,isEdit)=>{
    if(isEdit&&formItem?.id){
      const{error}=await db.from('crm_aktivitaeten').update(payload).eq('id',formItem.id);
      if(error) return error.message;
    }else{
      const{error}=await db.from('crm_aktivitaeten').insert(payload);
      if(error) return error.message;
    }
    reload(); return null;
  };
  const handleDelete=async(a)=>{
    await db.from('crm_aktivitaeten').delete().eq('id',a.id);
    setList(prev=>prev.filter(x=>x.id!==a.id)); setDetail(null);
  };

  const filtered=useMemo(()=>list.filter(a=>{
    if(filterTyp&&a.typ!==filterTyp) return false;
    if(search){const q=search.toLowerCase();if(![a.titel,a.ort,a.beschreibung].filter(Boolean).join(' ').toLowerCase().includes(q))return false;}
    return true;
  }),[list,search,filterTyp]);

  return <>
    <div style={{display:'flex',gap:10,flexWrap:'wrap',marginBottom:20}}>
      <div style={{background:'#fff',border:'1px solid var(--nfg-line)',borderRadius:12,padding:'12px 18px',textAlign:'center',minWidth:90}}>
        <div style={{fontSize:26,fontWeight:700}}>{list.length}</div>
        <div style={{fontSize:11,fontWeight:700,color:'#666',textTransform:'uppercase',letterSpacing:'0.04em'}}>Aktivitäten</div>
      </div>
      {Object.entries(AKT_TYP).map(([k,v])=>{
        const n=list.filter(a=>a.typ===k).length; if(!n) return null;
        return <div key={k} style={{background:v.color+'15',border:`1.5px solid ${v.color}40`,borderRadius:12,padding:'12px 18px',textAlign:'center',minWidth:80}}>
          <div style={{fontSize:22,fontWeight:700,color:v.color}}>{n}</div>
          <div style={{fontSize:11,fontWeight:700,color:v.color,textTransform:'uppercase',letterSpacing:'0.04em'}}>{v.label}</div>
        </div>;
      })}
    </div>
    <div className="nfg-admin-bar" style={{marginBottom:16}}>
      <div style={{display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}}>
        <div style={{position:'relative'}}>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#666" strokeWidth="2" style={{position:'absolute',left:12,top:'50%',transform:'translateY(-50%)'}}><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
          <input className="nfg-input" value={search} onChange={e=>setSearch(e.target.value)} placeholder="Titel, Ort…" style={{paddingLeft:36,width:200}}/>
        </div>
        <select className="nfg-select" value={filterTyp} onChange={e=>setFilterTyp(e.target.value)} style={{minWidth:150}}>
          <option value="">Alle Typen</option>
          {Object.entries(AKT_TYP).map(([k,v])=><option key={k} value={k}>{v.icon} {v.label}</option>)}
        </select>
      </div>
      <button className="nfg-btn-primary" onClick={()=>setFormItem(false)}>+ Neue Aktivität</button>
    </div>
    {loading&&<div style={{padding:'32px 0',textAlign:'center',color:'#666'}}>Laden…</div>}
    {!loading&&filtered.length===0&&<div className="nfg-empty">{list.length===0?'Noch keine Aktivitäten. Erstelle die erste.':'Keine Treffer.'}</div>}
    <div className="nfg-admin-list">
      {filtered.map(a=>{
        const typ=AKT_TYP[a.typ]||AKT_TYP.sonstiges;
        return <div key={a.id} className="nfg-admin-item" style={{cursor:'pointer'}} onClick={()=>setDetail(a)}>
          <div style={{width:38,height:38,borderRadius:10,background:typ.color+'18',display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,flexShrink:0}}>{typ.icon}</div>
          <div className="nfg-admin-info">
            <div className="nfg-admin-name" style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
              {a.titel}
              <AktBadge status={a.status}/>
            </div>
            <div className="nfg-admin-meta">{[typ.label,a.ort].filter(Boolean).join(' · ')}</div>
          </div>
          {a.datum_von&&<span style={{fontSize:11,color:'#888',flexShrink:0}}>{fmtDate(a.datum_von)}</span>}
        </div>;
      })}
    </div>
    {formItem!==null&&<CrmAktivitaetFormModal initial={formItem||null} onClose={()=>setFormItem(null)} onSave={handleSave}/>}
    {detail&&<CrmAktivitaetDetail akt={detail} onClose={()=>setDetail(null)} onEdit={a=>{setDetail(null);setFormItem(a);}} onDelete={handleDelete}/>}
  </>;
}

function MiniChart({data}) {
  const max=Math.max(...data.map(d=>d.count),1);
  return <div className="nfg-minichart">
    {data.map(({day,count})=>{
      const d=new Date(day+'T12:00:00');
      const lbl=`${d.getDate()}.${d.getMonth()+1}.`;
      return <div key={day} className="nfg-minichart-col">
        <div className="nfg-minichart-fill" style={{height:Math.max(3,Math.round(count/max*48))+'px',opacity:count?1:0.25}}/>
        <span className="nfg-minichart-lbl">{lbl}</span>
      </div>;
    })}
  </div>;
}

function StatCard({icon,label,value,sub}) {
  return <div className="nfg-stat-card">
    <span className="nfg-stat-icon">{icon}</span>
    <div className="nfg-stat-val">{value}</div>
    <div className="nfg-stat-lbl">{label}</div>
    {sub&&<div className="nfg-stat-sub">{sub}</div>}
  </div>;
}

function TopList({rows,max}) {
  if(!rows.length) return <p style={{fontSize:13,color:'#aaa',margin:'8px 0'}}>Keine Daten.</p>;
  return <div className="nfg-top-list">
    {rows.map(([name,count],i)=><div key={i} className="nfg-top-row">
      <span className="nfg-top-rank">{i+1}</span>
      <span className="nfg-top-name" title={name}>{name}</span>
      <div className="nfg-top-bar-wrap"><div className="nfg-top-bar" style={{width:Math.round(count/max*80)+'px'}}/></div>
      <span className="nfg-top-count">{count}</span>
    </div>)}
  </div>;
}

function AnalyticsTab({listings,events,magazine}) {
  const [loading,setLoading]=useState(true);
  const [refreshing,setRefreshing]=useState(false);
  const [lastUpdated,setLastUpdated]=useState(null);
  const [stats,setStats]=useState(null);

  const loadData=useCallback(async(isRefresh=false)=>{
    isRefresh?setRefreshing(true):setLoading(true);
    const since30=new Date(Date.now()-30*24*60*60*1000).toISOString();
    const [evRes,likesRes,commRes]=await Promise.all([
      db.from('analytics_events').select('event_type,ref_id,fingerprint,created_at').gte('created_at',since30).limit(50000),
      db.from('likes').select('unternehmen_id,created_at').limit(50000),
      db.from('comments').select('unternehmen_id,created_at').limit(50000),
    ]);
    const evts=evRes.data||[], likes=likesRes.data||[], comms=commRes.data||[];
    const byType={};
    evts.forEach(e=>{ byType[e.event_type]=(byType[e.event_type]||0)+1; });
    const uniqueVis=new Set(evts.filter(e=>e.event_type==='page_view').map(e=>e.fingerprint)).size;
    const topFor=type=>{ const c={}; evts.filter(e=>e.event_type===type&&e.ref_id).forEach(e=>{ c[e.ref_id]=(c[e.ref_id]||0)+1; }); return c; };
    const likesByItem={};  likes.forEach(l=>{ likesByItem[l.unternehmen_id]=(likesByItem[l.unternehmen_id]||0)+1; });
    const commsByItem={};  comms.forEach(c=>{ commsByItem[c.unternehmen_id]=(commsByItem[c.unternehmen_id]||0)+1; });
    const daily=Array.from({length:7},(_,i)=>{ const d=new Date(); d.setDate(d.getDate()-(6-i)); const day=d.toISOString().slice(0,10); return {day,count:evts.filter(e=>e.event_type==='page_view'&&e.created_at.slice(0,10)===day).length}; });
    const likes30=likes.filter(l=>l.created_at>=since30).length;
    const comms30=comms.filter(c=>c.created_at>=since30).length;
    const bizName=id=>listings.find(x=>x.id===id)?.name||id;
    const magName=id=>magazine.find(x=>x.id===id)?.title||id;
    const evName =id=>events.find(x=>x.id===id)?.title||id;
    const sortedTop=(counts,nameFn,n=6)=>Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,n).map(([id,c])=>[nameFn(id),c]);
    setStats({byType,uniqueVis,daily,likes30,comms30,
      topProfiles:sortedTop(topFor('profile_view'),bizName),
      topBookings:sortedTop(topFor('booking_click'),bizName),
      topLikes:sortedTop(likesByItem,bizName),
      topComments:sortedTop(commsByItem,bizName),
      topMag:sortedTop(topFor('magazine_click'),magName),
      topEvt:sortedTop(topFor('event_click'),evName),
    });
    setLastUpdated(new Date());
    setLoading(false); setRefreshing(false);
  },[listings,events,magazine]);

  useEffect(()=>{ loadData(); },[]);

  if(loading) return <p style={{color:'#666',fontSize:14,marginTop:20}}>Lade Analytics…</p>;
  const s=stats;
  const maxTop=rows=>rows.length?rows[0][1]:1;

  return <div>
    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:20,flexWrap:'wrap',gap:10}}>
      <span style={{fontSize:12,color:'#aaa'}}>
        {lastUpdated&&`Aktualisiert: ${lastUpdated.toLocaleTimeString('de-CH',{hour:'2-digit',minute:'2-digit'})} Uhr`}
      </span>
      <button className="nfg-btn-sm nfg-btn-sm-edit" onClick={()=>loadData(true)} disabled={refreshing}
        style={{display:'flex',alignItems:'center',gap:6,opacity:refreshing?0.6:1}}>
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"
          style={{transform:refreshing?'rotate(360deg)':'none',transition:refreshing?'transform 0.8s linear':'none'}}>
          <path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
        </svg>
        {refreshing?'Lädt…':'Aktualisieren'}
      </button>
    </div>
    <div className="nfg-analytics-sum">
      <StatCard icon="👁" label="Seitenbesuche" value={s.byType['page_view']||0} sub="letzte 30 Tage"/>
      <StatCard icon="👤" label="Unique Visitors" value={s.uniqueVis} sub="letzte 30 Tage"/>
      <StatCard icon="🏪" label="Aufrufe" value={s.byType['profile_view']||0} sub="Betriebe · 30 Tage"/>
      <StatCard icon="📅" label="Buchungen" value={s.byType['booking_click']||0} sub="Klicks · 30 Tage"/>
      <StatCard icon="❤️" label="Neue Likes" value={s.likes30} sub="letzte 30 Tage"/>
      <StatCard icon="💬" label="Kommentare" value={s.comms30} sub="letzte 30 Tage"/>
      <StatCard icon="📖" label="Magazin" value={s.byType['magazine_click']||0} sub="Klicks · 30 Tage"/>
      <StatCard icon="🎟" label="Events" value={s.byType['event_click']||0} sub="Klicks · 30 Tage"/>
    </div>

    <div className="nfg-analytics-h">Seitenbesuche — letzte 7 Tage</div>
    <MiniChart data={s.daily}/>

    <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(280px,1fr))',gap:24}}>
      <div>
        <div className="nfg-analytics-h">Top Betriebe — Aufrufe</div>
        <TopList rows={s.topProfiles} max={maxTop(s.topProfiles)}/>
      </div>
      <div>
        <div className="nfg-analytics-h">Top Betriebe — Buchungsklicks</div>
        <TopList rows={s.topBookings} max={maxTop(s.topBookings)}/>
      </div>
      <div>
        <div className="nfg-analytics-h">Top Betriebe — Likes</div>
        <TopList rows={s.topLikes} max={maxTop(s.topLikes)}/>
      </div>
      <div>
        <div className="nfg-analytics-h">Top Betriebe — Kommentare</div>
        <TopList rows={s.topComments} max={maxTop(s.topComments)}/>
      </div>
      {s.topMag.length>0&&<div>
        <div className="nfg-analytics-h">Magazin — Klicks</div>
        <TopList rows={s.topMag} max={maxTop(s.topMag)}/>
      </div>}
      {s.topEvt.length>0&&<div>
        <div className="nfg-analytics-h">Events — Klicks</div>
        <TopList rows={s.topEvt} max={maxTop(s.topEvt)}/>
      </div>}
    </div>
  </div>;
}

// ── Aktivität Übersicht (Startseite) ───────────────────────────
function AktivitaetUebersicht() {
  const [aktivitaeten, setAktivitaeten] = useState([]);
  const [selectedId, setSelectedId]     = useState('');
  const [showAbgeschlossen, setShowAbgeschlossen] = useState(false);
  const [akt, setAkt]           = useState(null);
  const [teilnehmer, setTeilnehmer] = useState([]);
  const [kontakte, setKontakte]   = useState([]);
  const [loading, setLoading]     = useState(false);

  // Lade alle Aktivitäten für Dropdown
  useEffect(() => {
    db.from('crm_aktivitaeten').select('id,titel,typ,status,datum_von,datum_bis,ort,beschreibung')
      .order('datum_von', {ascending: false, nullsFirst: false})
      .then(({data}) => {
        setAktivitaeten(data || []);
        // Auto-select erste nicht-abgeschlossene
        const first = (data||[]).find(a => a.status !== 'abgeschlossen' && a.status !== 'abgesagt');
        if (first) setSelectedId(first.id);
      });
  }, []);

  // Lade Detail wenn ID wechselt
  useEffect(() => {
    if (!selectedId) { setAkt(null); setTeilnehmer([]); setKontakte([]); return; }
    setLoading(true);
    Promise.all([
      db.from('crm_aktivitaeten').select('*').eq('id', selectedId).single(),
      db.from('crm_unternehmen_aktivitaeten').select('*,crm_unternehmen(*)').eq('aktivitaet_id', selectedId),
      db.from('crm_contacts_overview').select('id,vorname,nachname,funktion,email,telefon,kategorie_id,kategorie_farbe,kategorie_name,unternehmen_id,unternehmen_name,anfrage_verschickt,pm_geschickt,nachgehakt,do_not_contact').eq('unternehmen_id.in', '(select unternehmen_id from crm_unternehmen_aktivitaeten where aktivitaet_id=\'' + selectedId + '\')')
    ]).then(([{data: a}, {data: t}]) => {
      setAkt(a);
      setTeilnehmer(t || []);
      setLoading(false);
      // Lade Kontakte für teilnehmende Unternehmen
      const untIds = (t||[]).map(x => x.unternehmen_id);
      if (untIds.length > 0) {
        db.from('crm_contacts_overview')
          .select('id,vorname,nachname,funktion,email,telefon,kategorie_id,kategorie_farbe,kategorie_name,unternehmen_id,unternehmen_name,anfrage_verschickt,pm_geschickt,nachgehakt,do_not_contact')
          .in('unternehmen_id', untIds)
          .then(({data: c}) => setKontakte(c || []));
      } else {
        setKontakte([]);
      }
    });
  }, [selectedId]);

  const sichtbar = aktivitaeten.filter(a =>
    showAbgeschlossen ? true : (a.status !== 'abgeschlossen' && a.status !== 'abgesagt')
  );

  const typ = akt ? (AKT_TYP[akt.typ] || AKT_TYP.sonstiges) : null;

  // Stats
  const zugesagt  = teilnehmer.filter(t => t.zusage_status === 'ja').length;
  const abgesagt  = teilnehmer.filter(t => t.zusage_status === 'Absage').length;
  const offen     = teilnehmer.length - zugesagt - abgesagt;
  const pmCount   = kontakte.filter(c => c.pm_geschickt).length;
  const anfCount  = kontakte.filter(c => c.anfrage_verschickt).length;
  const dncCount  = kontakte.filter(c => c.do_not_contact).length;

  return <div className="nfg-page">
    <h2 className="nfg-page-h">Übersicht</h2>

    {/* Aktivität wählen */}
    <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:24,flexWrap:'wrap'}}>
      <div style={{flex:'1 1 280px',maxWidth:480}}>
        <select className="nfg-select" style={{width:'100%',fontSize:15,padding:'10px 14px'}}
          value={selectedId} onChange={e => setSelectedId(e.target.value)}>
          <option value="">— Aktivität wählen —</option>
          {sichtbar.map(a => {
            const t = AKT_TYP[a.typ] || AKT_TYP.sonstiges;
            const yr = a.datum_von ? ` (${a.datum_von.slice(0,4)})` : '';
            return <option key={a.id} value={a.id}>{t.icon} {a.titel}{yr}</option>;
          })}
        </select>
      </div>
      <label style={{display:'flex',alignItems:'center',gap:7,fontSize:13,color:'#666',cursor:'pointer',userSelect:'none',whiteSpace:'nowrap'}}>
        <input type="checkbox" checked={showAbgeschlossen} onChange={e => setShowAbgeschlossen(e.target.checked)}
          style={{width:15,height:15,cursor:'pointer'}}/>
        Abgeschlossene anzeigen
      </label>
    </div>

    {!selectedId && <div className="nfg-empty">Aktivität auswählen, um die Übersicht zu laden.</div>}

    {loading && <div style={{padding:'40px 0',textAlign:'center',color:'#888'}}>Laden…</div>}

    {akt && !loading && <>
      {/* Header Aktivität */}
      <div style={{background:'#fff',border:'1px solid var(--nfg-line)',borderRadius:16,padding:'20px 24px',marginBottom:20}}>
        <div style={{display:'flex',gap:10,alignItems:'flex-start',flexWrap:'wrap',justifyContent:'space-between'}}>
          <div>
            <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:8}}>
              <span style={{fontSize:24}}>{typ.icon}</span>
              <span style={{fontSize:12,fontWeight:700,color:typ.color,textTransform:'uppercase',letterSpacing:'0.06em'}}>{typ.label}</span>
              <AktBadge status={akt.status}/>
            </div>
            <h3 style={{margin:'0 0 6px',fontSize:22,fontWeight:700}}>{akt.titel}</h3>
            <div style={{fontSize:13,color:'#666',display:'flex',gap:16,flexWrap:'wrap'}}>
              {akt.datum_von && <span>📅 {fmtDate(akt.datum_von)}{akt.datum_bis && akt.datum_bis !== akt.datum_von ? ` – ${fmtDate(akt.datum_bis)}` : ''}</span>}
              {akt.ort && <span>📍 {akt.ort}</span>}
            </div>
            {akt.beschreibung && <p style={{margin:'10px 0 0',fontSize:13,color:'#555',lineHeight:1.6,maxWidth:600}}>{akt.beschreibung}</p>}
          </div>
        </div>
      </div>

      {/* KPI-Karten */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(130px,1fr))',gap:10,marginBottom:24}}>
        {[
          {n: teilnehmer.length, lbl:'Unternehmen', bg:'#f0f9ff', col:'#0369a1'},
          {n: kontakte.length,   lbl:'Kontakte',    bg:'#f5f3ff', col:'#6d28d9'},
          {n: zugesagt,          lbl:'Zugesagt',    bg:'#dcfce7', col:'#166534'},
          {n: abgesagt,          lbl:'Absagen',     bg:'#fee2e2', col:'#b91c1c'},

          <div key={lbl} style={{background:bg,border:`1.5px solid ${col}25`,borderRadius:12,padding:'14px 16px',textAlign:'center'}}>

          </div>
        )}
      </div>

      {/* Teilnehmende Unternehmen */}
      {teilnehmer.length > 0 && <section style={{marginBottom:24}}>
        <h3 style={{fontSize:16,fontWeight:700,margin:'0 0 12px'}}>🏢 Teilnehmende Unternehmen ({teilnehmer.length})</h3>
        <div style={{display:'flex',flexDirection:'column',gap:6}}>
          {teilnehmer.map(t => {
            const u = t.crm_unternehmen; if (!u) return null;
            const untKontakte = kontakte.filter(c => c.unternehmen_id === t.unternehmen_id);
            const statusColor = t.zusage_status === 'ja' ? '#166534' : t.zusage_status === 'Absage' ? '#b91c1c' : '#92400e';
            const statusBg    = t.zusage_status === 'ja' ? '#dcfce7' : t.zusage_status === 'Absage' ? '#fee2e2' : '#fef9c3';
            return <div key={t.unternehmen_id} style={{background:'#fff',border:'1px solid var(--nfg-line)',borderRadius:12,padding:'12px 16px'}}>
              <div style={{display:'flex',alignItems:'center',gap:10,flexWrap:'wrap',marginBottom: untKontakte.length ? 10 : 0}}>
                <span style={{fontSize:16}}>🏢</span>
                <div style={{flex:1}}>
                  <span style={{fontWeight:700,fontSize:14}}>{u.name}</span>

                  {c.telefon && <span style={{color:'#666'}}>📞 {c.telefon}</span>}
                  <div style={{display:'flex',gap:4,marginLeft:'auto'}}>
                    {c.anfrage_verschickt && <span style={{fontSize:10,background:'#dcfce7',color:'#166534',padding:'1px 6px',borderRadius:4,fontWeight:700}}>Anfrage ✓</span>}
                    {c.pm_geschickt && <span style={{fontSize:10,background:'#eff6ff',color:'#1d4ed8',padding:'1px 6px',borderRadius:4,fontWeight:700}}>PM ✓</span>}
                    {c.nachgehakt === 'ja' && <span style={{fontSize:10,background:'#f0fdf4',color:'#15803d',padding:'1px 6px',borderRadius:4,fontWeight:700}}>Nachgehakt ✓</span>}
                    {c.nachgehakt === 'Absage' && <span style={{fontSize:10,background:'#fee2e2',color:'#b91c1c',padding:'1px 6px',borderRadius:4,fontWeight:700}}>Absage</span>}
                    {c.do_not_contact && <span style={{fontSize:10,background:'#fafafa',color:'#ef4444',padding:'1px 6px',borderRadius:4,fontWeight:700,border:'1px solid #fca5a5'}}>⛔ DNC</span>}
                  </div>
                </div>)}
              </div>}
            </div>;
          })}
        </div>
      </section>}

      {teilnehmer.length === 0 && <div className="nfg-empty">Noch keine Unternehmen mit dieser Aktivität verknüpft.</div>}
    </>}
  </div>;
}

// ── App root ───────────────────────────────────────────────────
function App() {
  const [ready,setReady]=useState(false);
  const [user,setUser]=useState(null);
  const [userRole,setUserRole]=useState(null);
  const [listings,setListings]=useState([]);
  const [events,setEvents]=useState([]);
  const [magazine,setMagazine]=useState([]);
  const [locale,setLocale]=useState('DE');
  const [translations,setTranslations]=useState({});
  const [dbTypes,setDbTypes]=useState([]);
  const [dbTags,setDbTags]=useState([]);
  const [saved,setSaved]=useState([]);
  const savedRef=useRef([]);
  useEffect(()=>{ savedRef.current=saved; },[saved]);
  const [likeCounts,setLikeCounts]=useState({});
  const [myLikes,setMyLikes]=useState(new Set());
  const myLikesRef=useRef(new Set());
  useEffect(()=>{ myLikesRef.current=myLikes; },[myLikes]);
  // Einmaliger fingerprint pro Browser — localStorage UUID (für anon Nutzer)
  const localFp=useMemo(()=>{
    let fp=localStorage.getItem('nfg_fp');
    if(!fp){
      fp='xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,c=>{const r=Math.random()*16|0;return(c==='x'?r:(r&0x3|0x8)).toString(16);});
      localStorage.setItem('nfg_fp',fp);
    }
    return fp;
  },[]);
  // t() — Übersetzungsfunktion: gibt EN zurück wenn locale=EN und EN vorhanden, sonst DE (Fallback)
  const t=useCallback((key,fallbackDE='')=>{
    const row=translations[key];
    if(!row) return fallbackDE||key;
    return locale==='EN'&&row.en?row.en:row.de||fallbackDE||key;
  },[translations,locale]);

  // typeColor — Farbe eines Typs aus DB, Fallback auf Konstante
  const typeColor=useCallback(id=>{
    const dt=dbTypes.find(x=>x.id===id);
    return dt?dt.color:TYPE_COLORS[id]||'#999';
  },[dbTypes]);

  // typeLabel — Bezeichnung eines Typs in der aktuellen Sprache
  const typeLabel=useCallback(id=>{
    const dt=dbTypes.find(x=>x.id===id);
    if(!dt) return id;
    return locale==='EN'&&dt.name_en?dt.name_en:dt.name_de;
  },[dbTypes,locale]);

  // tagLabel — Bezeichnung eines Tags in der aktuellen Sprache
  const tagLabel=useCallback(id=>{
    const dt=dbTags.find(x=>x.id===id);
    if(!dt) return id;
    return locale==='EN'&&dt.name_en?dt.name_en:dt.name_de;
  },[dbTags,locale]);

  // userRef — für stabilen Zugriff in track() ohne stale closure
  const userRef=useRef(null);
  useEffect(()=>{ userRef.current=user; },[user]);
  // track() — fire & forget, kein await nötig
  const track=useCallback((eventType,refId=null)=>{
    db.from('analytics_events').insert({
      event_type:eventType,
      ref_id:refId?String(refId):null,
      fingerprint:localFp,
      user_id:userRef.current?.id||null
    }).then(()=>{});  // .then() nötig: Supabase JS v2 ist lazy — ohne .then()/await wird der Request nie abgeschickt
  },[localFp]);
  const [tab,setTab]=useState('start');
  const [authModal,setAuthModal]=useState(null);

  const loadRole=useCallback(async uid=>{
    if(!uid){setUserRole(null);return;}
    const {data,error}=await db.from('user_profiles').select('role').eq('id',uid).limit(1);
    if(error||!data||data.length===0){setUserRole('user');return;}
    setUserRole(data[0].role||'user');
  },[]);

  useEffect(()=>{
    let authDone=false;
    const check=()=>{ if(authDone) setReady(true); };

    db.auth.getSession().then(async ({data:{session}})=>{
      const u=session?.user??null;
      setUser(u);
      await loadRole(u?.id??null);
      authDone=true; check();
    });
    const {data:{subscription}}=db.auth.onAuthStateChange((_e,session)=>{
      const u=session?.user??null;
      setUser(u);
      loadRole(u?.id??null);
    });
    db.from('events').select('*').order('date_start').then(({data})=>{
      if(data) setEvents(data);
    });
    return ()=>subscription.unsubscribe();
  },[]);

  const onAuth=useCallback(mode=>setAuthModal(mode),[]);

  const onLogout=useCallback(async()=>{
    await db.auth.signOut();
    setUser(null); setUserRole(null);
  },[]);

  if(!ready) return <Loader/>;

  return <LangCtx.Provider value={{locale,setLocale,t,dbTypes,dbTags,typeColor,typeLabel,tagLabel}}>
    <div className="nfg-shell">
      <Sidebar tab={tab} setTab={setTab} user={user} onAuth={onAuth} onLogout={onLogout}/>
      <main className="nfg-main">
        {user ? <>
          {tab==='start'     && <AktivitaetUebersicht/>}
          {tab==='verwalten' && <VerwaltenPage events={events}/>}
        </> : <div className="nfg-page">
          <h2 className="nfg-page-h">Stammdaten</h2>
          <p className="nfg-login-hint">Bitte melde dich an, um die Datenbank zu verwenden.</p>
          <button className="nfg-btn-primary" onClick={()=>onAuth('login')}>Anmelden</button>
        </div>}
      </main>
      <MobileNav tab={tab} setTab={setTab}/>
      {authModal&&<AuthModal mode={typeof authModal==='object'?authModal.mode:authModal} hint={typeof authModal==='object'?authModal.hint:null} onClose={()=>setAuthModal(null)} onAuth={u=>{setUser(u);setAuthModal(null);loadRole(u?.id??null);}}/>}
    </div>
  </LangCtx.Provider>;
}

ReactDOM.createRoot(document.getElementById('root')).render(
  CONFIGURED ? <App/> : <SetupScreen/>
);
</script>
</body>
</html>
